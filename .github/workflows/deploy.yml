name: CI/CD Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test and Validate Application
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify app structure
        run: |
          test -f app.js
          test -f package.json
          test -d public
          test -f public/index.html
          test -f public/style.css

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test

    environment:
      name: production
      url: https://www.kbf-devops.fr

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        uses: azure/webapps-deploy@v2
        with:
          app-name: "app-devops-project-sdkg"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./app

      - name: Post-deployment health check
        run: |
          echo "Waiting for Azure app to restart..."
          for i in {1..10}; do
            echo "Health check attempt $i..."
            if curl -f https://app-devops-project-sdkg.azurewebsites.net/health; then
              echo "Application is healthy!"
              exit 0
            fi
            echo "App not ready yet, waiting 15 seconds..."
            sleep 15
          done
          echo "Health check failed after multiple attempts."
          exit 1