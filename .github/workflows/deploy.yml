name: CI/CD Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify app structure
        run: |
          ls -la
          test -f app.js
          test -f package.json

      - name: Archive application for deployment
        run: zip -r release.zip .
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "app-devops-project-sdkg"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./app

      - name: Post-deployment health check
        run: |
          echo "Waiting for Azure app to restart..."
          sleep 20
          curl -f https://app-devops-project-sdkg.azurewebsites.net/health